<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">
  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Payment Options</strong></h2>
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div>

  <div id="form-section">
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;color:#000;text-align:center;">Please enter reservation details</label>
      <label style="display:block;margin-bottom:5px;color:#000;">Booking Number</label>
      <input id="booking-input" type="text" placeholder="e.g. 4020" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block;margin-bottom:5px;color:#000;">Last Name</label>
      <input id="lastname-input" type="text" placeholder="e.g. Lucero" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;">
    </div>

    <button id="verify-btn" type="button" style="width:100%;padding:15px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;">
      Continue
    </button>
  </div>

  <div id="loading" style="display:none;padding:20px;text-align:center;">🔍 Searching Reservation....</div>
  <div id="booking-details" style="display:none;"></div>
  <div id="payment-buttons" style="display:none;padding-top:20px;"></div>
  <div id="error" style="display:none;color:#ef4444;text-align:center;padding:20px;"></div>
</div>

<!-- BANK POPUP -->
<div id="bank-popup" style="display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.65);">
  <div style="background:#fff;max-width:500px;margin:60px auto;padding:30px;border-radius:16px;position:relative;">
    
    <button onclick="closeBankPopup()" style="position:absolute;top:10px;right:15px;border:none;background:none;font-size:24px;cursor:pointer;">×</button>

    <h3 style="margin-top:0;text-align:center;">Bank Transfer</h3>
    <div style="border-bottom:1px solid #ddd;margin:15px 0;"></div>

    <div style="line-height:1.8;">
      <strong>Bank Name:</strong> ANZ Bank New Zealand Limited<br>
      <strong>Account Name:</strong>  WAKA CAMPA LTD<br>
      <strong>Account Number:</strong> 01-0142-0696381-00<br>
      <strong>BIC / SWIFT:</strong> ANZBNZ22
    </div>

    <div style="margin-top:20px;">
      <label style="font-weight:bold;display:block;margin-bottom:8px;">Upload Payment Receipt</label>
      <input type="file" id="receipt-file" style="width:100%;">
    </div>

    <button onclick="submitReceipt()" style="margin-top:20px;width:100%;padding:14px;background:#000;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
      Submit Receipt
    </button>

    <div id="receipt-msg" style="margin-top:12px;text-align:center;"></div>
  </div>
</div>

<script>
let currentBookingNum = '';
let currentLastName = '';
let currentEmail = '';
let currentOpportunityId = '';

document.getElementById('verify-btn').onclick = async function(e){
  e.preventDefault();

  currentBookingNum = document.getElementById('booking-input').value.trim();
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase();

  if(!currentBookingNum || !currentLastName){
    showError('Please enter both fields');
    return;
  }

  document.getElementById('form-section').style.display='none';
  document.getElementById('loading').style.display='block';

  try{
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/tCOOvcl51zUGXBu6w6CYD/sync',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        bookingNum:currentBookingNum,
        lastName:currentLastName
      })
    });

    let result;
    if(response.status===204){
      result={success:false,message:'Booking not found'};
    }else{
      result=await response.json();
    }

    if(result.success && result.data){

      const data=result.data;
      currentEmail = data.hirerEmail || data.email || '';
      currentOpportunityId = data.opportunityId || '';

      document.getElementById('loading').style.display='none';
      document.getElementById('booking-details').style.display='block';

      /* KEEPING ALL DETAILS UNTOUCHED */
      let html = `
      <div style="background:#fff;color:#000;padding:30px;border-radius:20px;text-align:left;box-shadow:0 20px 40px rgba(0,0,0,0.2);">
        <h2 style="margin:0 0 20px 0;text-align:center"><strong>Booking # ${data.bookingNum || 'N/A'}</strong></h2>
        <div style="border-bottom:1px solid #ddd;margin:0 0 20px 0;"></div>

        <div style="margin-bottom:20px;">
          <h4><strong><u>Booking Details</u></strong></h4>
          <div><strong>Pickup Date:</strong> ${data.pickupDate || 'N/A'}</div>
          <div><strong>Pickup Time:</strong> ${data.pickupTime || 'N/A'}</div>
          <div><strong>Pickup Location:</strong> ${data.pickupLocation || 'N/A'}</div>
          <div><strong>Dropoff Date:</strong> ${data.dropoffDate || 'N/A'}</div>
          <div><strong>Dropoff Time:</strong> ${data.dropoffTime || 'N/A'}</div>
          <div><strong>Dropoff Location:</strong> ${data.dropoffLocation || 'N/A'}</div>
          <div><strong>Total Cost:</strong> ${data.totalCost || 'N/A'}</div>
          <div><strong>Balance Due:</strong> ${data.totalBalanceDue || 'N/A'}</div>
        </div>

        <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>

        <div style="margin-bottom:20px;">
          <h4><strong><u>Contact Details</u></strong></h4>
          <div><strong>Hirer Full Name:</strong> ${data.hirerFullName || 'N/A'}</div>
          <div><strong>Email:</strong> ${data.hirerEmail || data.email || 'N/A'}</div>
          <div><strong>Phone:</strong> ${data.hirerPhone || 'N/A'}</div>
        </div>
      </div>
      `;

      document.getElementById('booking-details').innerHTML = html;

      /* PAYMENT BUTTONS */
      document.getElementById('payment-buttons').style.display='block';
      document.getElementById('payment-buttons').innerHTML = `
        <div style="display:grid;gap:12px;">

          <button onclick="payCard()" style="padding:14px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">
            💳 Credit / Debit Card
          </button>

          <button onclick="openBankPopup()" style="padding:14px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">
            🏦 Bank Transfer
          </button>

          <button onclick="payCrypto()" style="padding:14px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;">
            ₿ Crypto
          </button>

        </div>
      `;

    }else{
      showError(result.message || 'Booking not found');
    }

  }catch(error){
    showError('Connection error');
  }
};

function payCard(){
  /* SEND TO SLACK WEBHOOK */
  fetch('YOUR_SLACK_WEBHOOK_URL',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      text:`💳 Card Payment Requested\nBooking: ${currentBookingNum}\nLast Name: ${currentLastName}`
    })
  });

  alert('Payment team has been notified.');
}

function openBankPopup(){
  document.getElementById('bank-popup').style.display='block';
}

function closeBankPopup(){
  document.getElementById('bank-popup').style.display='none';
}

function submitReceipt(){
  const file = document.getElementById('receipt-file').files[0];

  if(!file){
    document.getElementById('receipt-msg').innerHTML='Please upload receipt.';
    return;
  }

  document.getElementById('receipt-msg').innerHTML='Receipt submitted for Booking #' + currentBookingNum;
}

function payCrypto(){
  alert(
    'Crypto payment coming soon.\\nBooking: ' +
    currentBookingNum +
    '\\nOpportunity ID: ' +
    currentOpportunityId
  );
}

function showError(msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('form-section').style.display='block';
  document.getElementById('error').style.display='block';
  document.getElementById('error').innerHTML=msg;
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
</style>
