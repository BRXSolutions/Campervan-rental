<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">

  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Payment Option</strong></h2>
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div>

  <!-- FORM -->
  <div id="form-section">
    <label style="display:block;margin-bottom:5px;font-weight:bold;text-align:center;">Please enter reservation details</label>

    <label>Booking Number</label>
    <input id="booking-input" type="text" placeholder="e.g. 4020"
      style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;">

    <label>Last Name</label>
    <input id="lastname-input" type="text" placeholder="e.g. Lucero"
      style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;margin-top:10px;">

    <button id="verify-btn"
      style="width:100%;margin-top:15px;padding:15px;background:#000;color:#fff;border-radius:8px;font-size:16px;">
      Submit
    </button>
  </div>

  <div id="loading" style="display:none;text-align:center;">🔍 Searching Reservation....</div>

  <div id="booking-details" style="display:none;"></div>

  <!-- CONFIRM BUTTONS -->
  <div id="confirmation-buttons" style="display:none;text-align:center;"></div>

  <!-- PAYMENT OPTIONS -->
  <div id="payment-options" style="display:none;text-align:center;margin-top:20px;">
    <h3>Select Payment Method</h3>

    <button onclick="payCard()" style="width:100%;padding:12px;margin:5px;background:#16a34a;color:#fff;border-radius:8px;">
      Credit / Debit Card
    </button>

    <button onclick="openBankModal()" style="width:100%;padding:12px;margin:5px;background:#2563eb;color:#fff;border-radius:8px;">
      Bank Transfer
    </button>

    <button onclick="showCrypto()" style="width:100%;padding:12px;margin:5px;background:#f97316;color:#fff;border-radius:8px;">
      Crypto
    </button>
  </div>

  <!-- BANK MODAL -->
  <div id="bank-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);">
    <div style="background:#fff;padding:20px;width:90%;max-width:400px;margin:100px auto;border-radius:10px;">
      <h3>Bank Transfer Details</h3>

      <p><strong>Bank:</strong> Example Bank</p>
      <p><strong>Account Name:</strong> Wakacampa Inc.</p>
      <p><strong>Account Number:</strong> 123-456-789</p>

      <input type="file" id="receipt-upload" style="margin-top:10px;">

      <button onclick="submitReceipt()" style="width:100%;margin-top:10px;padding:10px;background:#000;color:#fff;">
        Upload Receipt
      </button>

      <button onclick="closeBankModal()" style="width:100%;margin-top:5px;padding:10px;background:#ccc;">
        Close
      </button>
    </div>
  </div>

  <div id="error" style="display:none;color:red;text-align:center;"></div>
</div>

<script>
let currentBookingNum = '';
let currentLastName = '';
let currentEmail = '';

const SLACK_WEBHOOK = "YOUR_SLACK_WEBHOOK_URL_HERE";

document.getElementById('verify-btn').onclick = async function () {

  currentBookingNum = document.getElementById('booking-input').value.trim();
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase();

  if (!currentBookingNum || !currentLastName) {
    document.getElementById('error').innerText = "Please fill in all fields";
    document.getElementById('error').style.display = "block";
    return;
  }

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/tCOOvcl51zUGXBu6w6CYD/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bookingNum: currentBookingNum, lastName: currentLastName })
    });

    const result = await response.json();

    document.getElementById('loading').style.display = 'none';

    if (result.success && result.data) {

      document.getElementById('booking-details').style.display = 'block';
      document.getElementById('booking-details').innerHTML =
        "<h3>Booking Found: #" + result.data.bookingNum + "</h3>";

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <button onclick="handleDetailsCorrect()" style="padding:10px;background:green;color:#fff;margin:5px;">
          Details are correct
        </button>
        <button onclick="window.location.href='mailto:support@wakacampa.com'" style="padding:10px;background:red;color:#fff;margin:5px;">
          Details are incorrect
        </button>
      `;
    }

  } catch (err) {
    document.getElementById('error').innerText = "Connection error";
    document.getElementById('error').style.display = "block";
  }
};

function handleDetailsCorrect() {
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('payment-options').style.display = 'block';
}

/* PAYMENT ACTIONS */

function payCard() {
  sendSlackNotification("💳 Card Payment selected for Booking #" + currentBookingNum);
  alert("Redirecting to card payment...");
}

function openBankModal() {
  document.getElementById('bank-modal').style.display = 'block';
}

function closeBankModal() {
  document.getElementById('bank-modal').style.display = 'none';
}

function submitReceipt() {
  alert("Receipt uploaded!");
  closeBankModal();
}

function showCrypto() {
  alert("Crypto payment: Send to wallet address XYZ123...");
}

/* SLACK */
function sendSlackNotification(message) {
  fetch(SLACK_WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: message })
  });
}

/* RESET */
function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('payment-options').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('error').style.display = 'none';
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
</style>
