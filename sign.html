<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Your Vehicle Rental Agreement</title>
  <meta name="viewport" content="width=device‑width,initial‑scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
      font-family: 'DM Sans', Arial, sans-serif;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 30px;
      background: #fff;
      color: #000;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
      border-radius: 16px;
      font-family: 'DM Sans', Arial, sans-serif;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: bold;
    }
    .divider {
      border-bottom: 1px solid #ddd;
      margin: 20px 0;
    }
    canvas {
      width: 100%;
      height: 150px;
      border: 2px solid #bdbdbd;
      background: #f9f9f9;
      border-radius: 8px;
      margin: 15px 0;
      cursor: crosshair;
    }
    button {
      width: 100%;
      padding: 15px;
      background: radial-gradient(circle 300px at 50% 70%, #444, #000);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'DM Sans', Arial, sans-serif;
      margin: 10px 0;
    }
    button.btn-clear {
      background: radial-gradient(circle 300px at 50% 70%, #aaa, #666);
    }
    .error {
      padding-top: 15px;
      color: #ef4444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="text-align:center;margin-bottom:30px;">
      <h2><strong>Sign your Vehicle Rental Agreement</strong></h2>
      <div class="divider"></div>
    </div>

    <div id="auth-info" style="margin-bottom:20px;"></div>

    <canvas id="signature-canvas"></canvas>

    <button id="clear-btn" class="btn btn-clear">✖ Clear</button>
    <button id="save-btn" class="btn">✓ Save Signature</button>

    <div id="error" class="error" style="display:none;"></div>
  </div>

  <script>
    // 1. Load auth data from localStorage
    const authRaw = localStorage.getItem('rcmEsignAuth');
    let authData = null;

    if (!authRaw) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML = `
        ❌ No booking authentication found.<br>
        Please go back to the booking lookup page and try again.
      `;
    } else {
      try {
        authData = JSON.parse(authRaw);
      } catch (e) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = `
          ❌ Authentication data corrupted. Please try again.
        `;
      }
    }

    if (authData) {
      const authInfo = document.getElementById('auth-info');
      authInfo.innerHTML = `
        <div style="font-size:16px;margin-bottom:10px;">
          Booking #${authData.bookingNum || 'N/A'}<br>
          <small>Reserving: ${authData.lastName || 'Unknown Hirer'}</small>
        </div>
      `;
    }

    // 2. Signature canvas setup
    const canvas = document.getElementById('signature-canvas');
    const ctx = canvas.getContext('2d');

    const dpr = window.devicePixelRatio || 1;
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = 2;

    let isDrawing = false;

    function getClientPos(e) {
      const rect = canvas.getBoundingClientRect();
      const isTouch = e.type.startsWith('touch');
      const touch = isTouch ? e.touches[0] : null;

      const x = (isTouch ? touch.clientX : e.clientX) - rect.left;
      const y = (isTouch ? touch.clientY : e.clientY) - rect.top;

      return { x, y };
    }

    canvas.addEventListener('mousedown', (e) => {
      const pos = getClientPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      isDrawing = true;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const pos = getClientPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });

    function stopDraw() {
      isDrawing = false;
      ctx.beginPath();
    }

    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseout', stopDraw);

    // Touch support
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      ctx.beginPath();
      ctx.moveTo(x, y);
      isDrawing = true;
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      ctx.lineTo(x, y);
      ctx.stroke();
    });

    canvas.addEventListener('touchend', () => {
      isDrawing = false;
      ctx.beginPath();
    });

    // 3. Clear signature
    document.getElementById('clear-btn').onclick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    // 4. Save signature → send to Activepieces
    document.getElementById('save-btn').onclick = () => {
      if (!authData || !authData.reservationRef) {
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = `
          ❌ No reservation reference found.<br>
          Please go back to the booking lookup page.
        `;
        return;
      }

      const pngDataUrl = canvas.toDataURL('image/png');

      const payload = {
        bookingNum: authData.bookingNum,
        lastName: authData.lastName,
        reservationRef: authData.reservationRef,
        signature: pngDataUrl,
        signatureTimestamp: Date.now()
      };

      // Send to your Activepieces webhook
      fetch('https://cloud.activepieces.com/api/v1/webhooks/KtVAXC3qtMkvMxfbmzu7C', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (response.ok || response.status === 204) {
          alert('Signature saved successfully!');
          window.close();
        } else {
          response.text().then(text => {
            console.error('Save failed:', text);
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerHTML = `
              ❌ Failed to save signature.<br>
              Please try again or contact support.
            `;
          });
        }
      })
      .catch(error => {
        console.error('Network error:', error);
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = `
          ❌ Network error. Check console and try again.
        `;
      });
    };
  </script>
</body>
</html>
