<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">
  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Drive Safe Guide and Camper Van Onboarding Form</strong></h2>
    <p style="margin:0;font-size:16px;">Mandatory Pre-hire Task</p>
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div>

  <div id="form-section">
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;text-align:center;">Please enter reservation details</label>
      <label>Booking Number</label>
      <input id="booking-input" type="text" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;">
    </div>

    <div style="margin-bottom:25px;">
      <label>Last Name</label>
      <input id="lastname-input" type="text" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;">
    </div>

    <button id="verify-btn" style="width:100%;padding:15px;background:#000;color:#fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;">
      Submit
    </button>
  </div>

  <div id="loading" style="display:none;text-align:center;">🔍 Searching Reservation....</div>
  <div id="booking-details" style="display:none;"></div>
  <div id="confirmation-buttons" style="display:none;"></div>
  <div id="survey-iframe" style="display:none;width:100%;"></div>
  <div id="error" style="display:none;color:red;text-align:center;"></div>
</div>

<script>
let currentBookingNum = '';
let currentLastName = '';
let currentEmail = '';

document.getElementById('verify-btn').onclick = async function(e) {
  e.preventDefault();

  currentBookingNum = document.getElementById('booking-input').value.trim();
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase();

  if (!currentBookingNum || !currentLastName) {
    document.getElementById('error').innerHTML = "Please fill all fields";
    document.getElementById('error').style.display = "block";
    return;
  }

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/tCOOvcl51zUGXBu6w6CYD/sync', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({bookingNum: currentBookingNum, lastName: currentLastName})
    });

    const result = await response.json();

    if (result.success && result.data) {
      const data = result.data;
      currentEmail = data.hirerEmail || data.email || '';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('booking-details').style.display = 'block';

      document.getElementById('booking-details').innerHTML = `
        <h3>Booking #${data.bookingNum}</h3>
        <p><strong>Name:</strong> ${data.hirerFullName}</p>
        <p><strong>Email:</strong> ${currentEmail}</p>
      `;

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <button onclick="handleDetailsCorrect()" style="padding:12px;background:green;color:#fff;border-radius:8px;">
          Details are correct
        </button>
      `;

    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').innerHTML = "Booking not found";
    }

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = "Error connecting to server";
  }
};

/* =========================
   FIXED SURVEY FUNCTION
========================= */
function handleDetailsCorrect() {
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';

  const url =
    `https://api.leadconnectorhq.com/widget/survey/hguGjV9kDYPzFtYLdtUI` +
    `?booking_number=${encodeURIComponent(currentBookingNum)}` +
    `&email=${encodeURIComponent(currentEmail)}` +
    `&last_name=${encodeURIComponent(currentLastName)}`;

  const iframe = document.createElement('iframe');

  iframe.src = url;
  iframe.style.width = "100%";
  iframe.style.height = "600px";
  iframe.style.border = "none";

  // 🔥 CRITICAL FIX: prevents redirect taking over your page
  iframe.setAttribute("sandbox", "allow-scripts allow-forms allow-same-origin");

  document.getElementById('survey-iframe').innerHTML = '';
  document.getElementById('survey-iframe').appendChild(iframe);
  document.getElementById('survey-iframe').style.display = 'block';

  // show popup after delay (since cross-domain can't be detected reliably)
  setTimeout(showThankYouPopup, 15000);
}

/* =========================
   THANK YOU POPUP
========================= */
function showThankYouPopup() {
  if (document.getElementById('thankyou-modal')) return;

  const modal = document.createElement('div');
  modal.id = "thankyou-modal";
  modal.style.position = "fixed";
  modal.style.top = "0";
  modal.style.left = "0";
  modal.style.width = "100%";
  modal.style.height = "100%";
  modal.style.background = "rgba(0,0,0,0.6)";
  modal.style.display = "flex";
  modal.style.alignItems = "center";
  modal.style.justifyContent = "center";
  modal.style.zIndex = "9999";

  modal.innerHTML = `
    <div style="background:#fff;padding:30px;border-radius:16px;text-align:center;max-width:400px;">
      <div style="font-size:50px;">✅</div>
      <h2>Thank you!</h2>
      <p>Your response was submitted successfully.</p>
      <button id="ok-btn" style="padding:10px 20px;background:#000;color:#fff;border:none;border-radius:8px;">
        OK
      </button>
    </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('ok-btn').onclick = function () {
    window.location.href =
      "https://brxsolutions.github.io/Campervan-rental/drivesafe-campervanguide-onboardingform.html";
  };

  setTimeout(() => {
    window.location.href =
      "https://brxsolutions.github.io/Campervan-rental/drivesafe-campervanguide-onboardingform.html";
  }, 3000);
}
</script>
