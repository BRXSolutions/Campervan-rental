<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">
  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Drive Safe Guide and Camper Van Onboarding Form</strong></h2>
    <p style="margin:0;font-size:16px;">Mandatory Pre-hire Task</p>
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div>

  <div id="form-section">
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;color:#000;text-align:center;">Please enter reservation details</label>
      <label style="display:block;margin-bottom:5px;color:#000;">Booking Number</label>
      <input id="booking-input" type="text" placeholder="e.g. 4020" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block;margin-bottom:5px;color:#000;">Last Name</label>
      <input id="lastname-input" type="text" placeholder="e.g. Lucero" style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;color:#000;border-radius:8px;font-size:16px;font-family:'DM Sans',Arial,sans-serif;">
    </div>

    <button id="verify-btn" type="button" style="width:100%;padding:15px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;font-family:'DM Sans',Arial,sans-serif;">
      Submit
    </button>
  </div>

  <div id="loading" style="display:none;padding:20px;text-align:center;color:#000;">🔍 Searching Reservation....</div>
  <div id="booking-details" style="display:none;"></div>
  <div id="confirmation-buttons" style="display:none;padding:20px;text-align:center;"></div>
  <div id="survey-iframe" style="display:none;width:100%;border:none;"></div>
  <div id="error" style="display:none;color:#ef4444;text-align:center;padding:20px;"></div>
</div>

<script>
let currentBookingNum = '';
let currentLastName = '';
let currentEmail = '';

document.getElementById('verify-btn').onclick = async function(e) {
  e.preventDefault();

  currentBookingNum = document.getElementById('booking-input').value.trim();
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase();

  if (!currentBookingNum || !currentLastName) {
    document.getElementById('error').innerHTML = 'Please enter both fields';
    document.getElementById('error').style.display = 'block';
    return;
  }

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';

  try {
    const response = await fetch('https://cloud.activepieces.com/api/v1/webhooks/tCOOvcl51zUGXBu6w6CYD/sync', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        bookingNum: currentBookingNum,
        lastName: currentLastName
      })
    });

    const result = await response.json();

    // UPDATED for ActivePieces structure
    if (result.body && result.body.success && result.body.data) {

      const data = result.body.data;

      // SAVE EMAIL HERE
      currentEmail = data.email || data.hirerEmail || '';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('booking-details').style.display = 'block';

      document.getElementById('booking-details').innerHTML = `
        <div style="background:#fff;color:#000;padding:30px;border-radius:20px;text-align:left;box-shadow:0 20px 40px rgba(0,0,0,0.15);">
          <h2 style="margin:0 0 20px 0;text-align:center;"><strong>Booking # ${data.bookingNum || currentBookingNum}</strong></h2>
          <div style="border-bottom:1px solid #ddd;margin:0 0 20px 0;"></div>

          <h4><u>Contact Details</u></h4>
          <div style="line-height:1.8;">
            <div><strong>Name:</strong> ${data.hirerFullName || 'N/A'}</div>
            <div><strong>Email:</strong> ${currentEmail || 'N/A'}</div>
            <div><strong>Phone:</strong> ${data.hirerPhone || 'N/A'}</div>
          </div>
        </div>
      `;

      document.getElementById('confirmation-buttons').style.display = 'block';
      document.getElementById('confirmation-buttons').innerHTML = `
        <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;">
          <button onclick="handleDetailsCorrect()"
            style="flex:1;max-width:220px;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
            ✓ Details are correct
          </button>

          <button onclick="resetForm()"
            style="flex:1;max-width:220px;padding:12px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
            ✗ Details are incorrect
          </button>
        </div>
      `;

    } else {
      showError('❌ Booking not found');
    }

  } catch (error) {
    console.error(error);
    showError('❌ Connection error. Please try again.');
  }
};

// UPDATED ONLY THIS FUNCTION
function handleDetailsCorrect() {

  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';

  const cacheBuster = Date.now();

  const surveyUrl =
    `https://api.leadconnectorhq.com/widget/survey/hguGjV9kDYPzFtYLdtUI` +
    `?booking_number=${encodeURIComponent(currentBookingNum)}` +
    `&last_name=${encodeURIComponent(currentLastName)}` +
    `&email=${encodeURIComponent(currentEmail)}` +
    `&t=${cacheBuster}`;

  const iframe = document.createElement('iframe');
  iframe.src = surveyUrl;
  iframe.style.border = 'none';
  iframe.style.width = '100%';
  iframe.style.height = '650px';
  iframe.style.display = 'block';
  iframe.scrolling = 'no';
  iframe.id = 'hguGjV9kDYPzFtYLdtUI';
  iframe.title = 'survey';

  document.getElementById('survey-iframe').innerHTML = '';
  document.getElementById('survey-iframe').appendChild(iframe);
  document.getElementById('survey-iframe').style.display = 'block';

  if (!document.querySelector('script[src*="form_embed.js"]')) {
    const script = document.createElement('script');
    script.src = `https://link.msgsndr.com/js/form_embed.js?t=${cacheBuster}`;
    document.head.appendChild(script);
  }

  // FORCE FILL EMAIL
  iframe.onload = function() {
    const tryFill = setInterval(() => {
      try {
        const doc = iframe.contentWindow.document;

        const emailField =
          doc.querySelector('input[type="email"]') ||
          doc.querySelector('input[name="email"]') ||
          doc.querySelector('input[placeholder*="Email"]');

        if (emailField) {
          emailField.value = currentEmail || '';
          emailField.dispatchEvent(new Event('input', { bubbles:true }));
          emailField.dispatchEvent(new Event('change', { bubbles:true }));
          clearInterval(tryFill);
        }
      } catch(err) {}
    }, 800);
  };
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').innerHTML = `
    <div>${msg}</div>
    <button onclick="resetForm()" style="margin-top:15px;padding:10px 20px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;">
      Try Again
    </button>
  `;
}

function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('survey-iframe').style.display = 'none';
  document.getElementById('error').style.display = 'none';

  currentBookingNum = '';
  currentLastName = '';
  currentEmail = '';
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
</style>
