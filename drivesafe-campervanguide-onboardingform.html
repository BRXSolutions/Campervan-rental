<div style="max-width:500px;margin:0 auto;padding:30px;background:#fff;color:#000;box-shadow:inset 0 0 10px rgba(0,0,0,0.1);font-family:'DM Sans',Arial,sans-serif;border-radius:16px;">
  <div style="text-align:center;margin-bottom:30px;">
    <h2 style="margin:0 0 10px 0;font-size:18px;"><strong>Drive Safe Guide and Camper Van Onboarding Form</strong></h2>
    <p style="margin:0;font-size:16px;">Mandatory Pre-hire Task</p>
    <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>
  </div>

  <!-- FORM -->
  <div id="form-section">
    <div style="margin-bottom:20px;">
      <label style="display:block;margin-bottom:5px;font-weight:bold;text-align:center;">Please enter reservation details</label>
      <label style="display:block;margin-bottom:5px;">Booking Number</label>
      <input id="booking-input" type="text" placeholder="e.g. 4020"
        style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;font-size:16px;">
    </div>

    <div style="margin-bottom:25px;">
      <label style="display:block;margin-bottom:5px;">Last Name</label>
      <input id="lastname-input" type="text" placeholder="e.g. Lucero"
        style="width:100%;padding:12px;border:2px solid #bdbdbd;background:#e0e0e0;border-radius:8px;font-size:16px;">
    </div>

    <button id="verify-btn" type="button"
      style="width:100%;padding:15px;background:radial-gradient(circle 300px at 50% 70%, #444, #000);color:#fff;border:2px solid #fff;border-radius:8px;font-size:18px;font-weight:bold;cursor:pointer;">
      Submit
    </button>
  </div>

  <!-- STATES -->
  <div id="loading" style="display:none;padding:20px;text-align:center;">🔍 Searching Reservation...</div>
  <div id="booking-details" style="display:none;"></div>
  <div id="confirmation-buttons" style="display:none;"></div>
  <div id="survey-iframe" style="display:none;"></div>
  <div id="error" style="display:none;color:#ef4444;text-align:center;padding:20px;"></div>
</div>

<script>
let currentBookingNum = '';
let currentLastName = '';
let currentEmail = '';

const webhookUrl = 'https://cloud.activepieces.com/api/v1/webhooks/tCOOvcl51zUGXBu6w6CYD/sync';

document.getElementById('verify-btn').onclick = verifyBooking;

async function verifyBooking() {
  currentBookingNum = document.getElementById('booking-input').value.trim();
  currentLastName = document.getElementById('lastname-input').value.trim().toLowerCase();

  if (!currentBookingNum || !currentLastName) {
    showError('Please enter both Booking Number and Last Name.');
    return;
  }

  hideAll();
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingNum: currentBookingNum,
        lastName: currentLastName
      })
    });

    const result = await response.json();

    // FIXED FOR ACTIVEPIECES BODY STRUCTURE
    if (result.body?.success && result.body?.data) {
      const data = result.body.data;

      currentEmail = data.email || data.hirerEmail || '';

      renderBookingDetails(data);
      renderButtons();
    } else {
      showError('❌ Booking not found');
    }

  } catch (err) {
    showError('❌ Connection error. Please try again.');
    console.error(err);
  }
}

function renderBookingDetails(data) {
  document.getElementById('loading').style.display = 'none';

  document.getElementById('booking-details').innerHTML = `
    <div style="background:#fff;padding:25px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,0.08);">

      <h2 style="text-align:center;margin-top:0;">Booking #${data.bookingNum || currentBookingNum}</h2>
      <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>

      <h4><u>Booking Details</u></h4>
      <div style="line-height:1.8;">
        <div><strong>Status:</strong> ${data.reservationStatus || 'N/A'}</div>
        <div><strong>Pickup Date:</strong> ${data.pickupDate || 'N/A'}</div>
        <div><strong>Pickup Time:</strong> ${data.pickupTime || 'N/A'}</div>
        <div><strong>Dropoff Date:</strong> ${data.dropoffDate || 'N/A'}</div>
        <div><strong>Dropoff Time:</strong> ${data.dropoffTime || 'N/A'}</div>
        <div><strong>Total Cost:</strong> ${data.totalCost || 'N/A'}</div>
      </div>

      <div style="border-bottom:1px solid #ddd;margin:20px 0;"></div>

      <h4><u>Contact Details</u></h4>
      <div style="line-height:1.8;">
        <div><strong>Name:</strong> ${data.hirerFullName || 'N/A'}</div>
        <div><strong>Email:</strong> ${data.email || data.hirerEmail || 'N/A'}</div>
        <div><strong>Phone:</strong> ${data.hirerPhone || 'N/A'}</div>
      </div>

    </div>
  `;

  document.getElementById('booking-details').style.display = 'block';
}

function renderButtons() {
  document.getElementById('confirmation-buttons').innerHTML = `
    <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;">

      <button onclick="loadSurvey()"
        style="flex:1;padding:14px;background:#16a34a;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
        ✓ Details Correct
      </button>

      <button onclick="contactSupport()"
        style="flex:1;padding:14px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
        ✗ Incorrect Details
      </button>

    </div>
  `;
  document.getElementById('confirmation-buttons').style.display = 'block';
}

function loadSurvey() {
  hideAll();

  const cache = Date.now();

  // AUTO PASS EMAIL TO GHL FORM
  const surveyUrl =
    `https://api.leadconnectorhq.com/widget/survey/hguGjV9kDYPzFtYLdtUI` +
    `?booking_number=${encodeURIComponent(currentBookingNum)}` +
    `&last_name=${encodeURIComponent(currentLastName)}` +
    `&email=${encodeURIComponent(currentEmail)}` +
    `&t=${cache}`;

  document.getElementById('survey-iframe').innerHTML = `
    <iframe
      src="${surveyUrl}"
      style="width:100%;height:700px;border:none;"
      scrolling="no"
      title="survey">
    </iframe>
  `;

  document.getElementById('survey-iframe').style.display = 'block';

  // Load GHL script once
  if (!document.querySelector('script[src*="form_embed.js"]')) {
    const script = document.createElement('script');
    script.src = 'https://link.msgsndr.com/js/form_embed.js';
    document.body.appendChild(script);
  }
}

function contactSupport() {
  window.location.href =
    `mailto:support@wakacampa.com?subject=Booking Issue ${currentBookingNum}`;
}

function showError(msg) {
  hideAll();
  document.getElementById('error').innerHTML = `
    <div>${msg}</div>
    <button onclick="resetForm()"
      style="margin-top:15px;padding:10px 18px;background:#000;color:#fff;border:none;border-radius:8px;cursor:pointer;">
      Try Again
    </button>
  `;
  document.getElementById('error').style.display = 'block';
}

function hideAll() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('booking-details').style.display = 'none';
  document.getElementById('confirmation-buttons').style.display = 'none';
  document.getElementById('survey-iframe').style.display = 'none';
  document.getElementById('error').style.display = 'none';
}

function resetForm() {
  hideAll();
  document.getElementById('form-section').style.display = 'block';
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

body{
  font-family:'DM Sans',Arial,sans-serif;
}

button:hover{
  opacity:.92;
}

input:focus{
  outline:none;
  border-color:#000;
}
</style>
